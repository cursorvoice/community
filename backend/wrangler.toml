name = "cv-community"
main = "worker.js"
compatibility_date = "2024-11-01"

# Stable custom domain so the app can hard-code https://api.cursorvoice.app.
# wrangler creates the Workers route + DNS automatically on deploy, since the
# cursorvoice.app zone is on your Cloudflare account.
[[routes]]
pattern = "api.cursorvoice.app"
custom_domain = true

# Created by:  wrangler kv namespace create KNOWN   -> setup.sh writes the id here
[[kv_namespaces]]
binding = "KNOWN"
id = "PASTE_KV_NAMESPACE_ID_HERE"

[vars]
REPO = "cursorvoice/community"
ALLOW_ORIGIN = "https://community.cursorvoice.app"
# Allowed token audiences. The app's Desktop client id is already filled in;
# setup.sh prepends your new Web client id (for the website sign-in).
GOOGLE_AUDS = "WEB_CLIENT_ID.apps.googleusercontent.com,946007924079-c3nmabuvesemdkktjn4oegg9f43ajem5.apps.googleusercontent.com"

# GITHUB_TOKEN is a SECRET — never put it here. setup.sh runs:
#   wrangler secret put GITHUB_TOKEN
